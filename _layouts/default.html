<!DOCTYPE html>
<html lang="{{ site.lang | default: 'es' }}" data-theme="dark">
<head>
  {% include head.html %}
</head>
<body>
  <a href="#main-content" class="skip-link">Saltar al contenido</a>
  <div class="topbar" id="topbar">
    <button class="hamburger" id="hamburger-btn" aria-label="Abrir menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <a href="{{ '/' | relative_url }}" class="topbar-title">{{ site.title }}</a>
    <button class="topbar-search-btn" id="topbar-search-btn" aria-label="Buscar">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="layout">
    {% include sidebar.html %}
    <div class="divider"></div>
    <main class="content" id="main-content">
      {% unless paginator or page.layout == 'post' or page.url == '/' %}
        {% if page.title %}
        <nav class="breadcrumb" aria-label="Ruta de navegación">
          <a href="{{ '/' | relative_url }}" class="breadcrumb-link">Blog</a>
          <span class="breadcrumb-sep" aria-hidden="true">/</span>
          <span class="breadcrumb-current">{{ page.title }}</span>
        </nav>
        {% endif %}
      {% endunless %}
      {{ content }}
    </main>
  </div>

  {% include footer.html %}
  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
</body>
</html>
